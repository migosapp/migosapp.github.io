<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Migos — Conecta con locales de todo el mundo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #fff; color: #111; }
    header { background: #F03E5C; padding: 20px 24px; display: flex; align-items: center; gap: 12px; }
    header h1 { color: #fff; font-size: 22px; font-weight: 800; }
    .hero { padding: 60px 24px; text-align: center; max-width: 600px; margin: 0 auto; }
    .hero h2 { font-size: 28px; font-weight: 800; color: #111; margin-bottom: 16px; }
    .hero p { font-size: 16px; color: #555; line-height: 1.6; margin-bottom: 32px; }
    .links { display: flex; flex-direction: column; gap: 12px; align-items: center; }
    .link-btn { display: block; padding: 14px 32px; border-radius: 50px; text-decoration: none; font-weight: 700; font-size: 15px; width: 100%; max-width: 320px; text-align: center; }
    .link-btn.primary { background: #F03E5C; color: #fff; }
    .link-btn.secondary { border: 2px solid #E5E5E5; color: #333; }
    footer { text-align: center; padding: 24px; color: #999; font-size: 13px; border-top: 1px solid #F0F0F0; margin-top: 40px; }
  </style>
</head>
<body>
  <header>
    <h1>Migos</h1>
  </header>
  <div class="hero">
    <h2>Conecta con locales de todo el mundo</h2>
    <p>Descubre cada ciudad desde dentro. Migos conecta viajeros con personas locales para vivir experiencias auténticas.</p>
    <div class="links">
      <a href="privacy.html" class="link-btn secondary">Política de privacidad</a>
      <a href="terms.html" class="link-btn secondary">Términos y condiciones</a>
    </div>
  </div>
  <footer>© 2026 Migos App · <a href="mailto:soporte@migos.app" style="color:#F03E5C;">soporte@migos.app</a></footer>
</body>
</html>
